<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Docker Containers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #fff;
      width: 350px;
      min-height: 200px;
      max-height: 500px;
      overflow: hidden;
    }
    
    .header {
      padding: 12px 16px;
      background: #2d2d2d;
      border-bottom: 1px solid #3d3d3d;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    
    .count {
      background: #0d9488;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-left: auto;
    }
    
    .search-box {
      padding: 12px 16px;
      background: #252525;
    }
    
    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #3d3d3d;
      border-radius: 6px;
      background: #1e1e1e;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    
    .search-box input:focus {
      border-color: #0d9488;
    }
    
    .search-box input::placeholder {
      color: #666;
    }
    
    .container-list {
      overflow-y: auto;
      max-height: 350px;
    }
    
    .container-item {
      padding: 10px 16px;
      border-bottom: 1px solid #2d2d2d;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .container-item:hover {
      background: #2d2d2d;
    }
    
    .container-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-running {
      background: #22c55e;
    }
    
    .status-stopped {
      background: #ef4444;
    }
    
    .status-exited {
      background: #6b7280;
    }
    
    .container-image {
      font-size: 11px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .empty-state {
      padding: 40px 16px;
      text-align: center;
      color: #666;
    }
    
    .footer {
      padding: 8px 16px;
      background: #2d2d2d;
      border-top: 1px solid #3d3d3d;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
    }
    
    .footer button {
      background: none;
      border: none;
      color: #0d9488;
      cursor: pointer;
      font-size: 11px;
    }
    
    .footer button:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐳 Docker Containers</h1>
    <span class="count" id="count">0</span>
  </div>
  
  <div class="search-box">
    <input type="text" id="search" placeholder="Filter by name...">
  </div>
  
  <div class="container-list" id="container-list">
    <div class="empty-state">Loading...</div>
  </div>
  
  <div class="footer">
    <button id="refresh">↻ Refresh</button>
    <span id="last-updated"></span>
  </div>

  <script>
    const { ipcRenderer } = window.electronAPI;
    
    let containers = [];
    const searchInput = document.getElementById('search');
    const containerList = document.getElementById('container-list');
    const countEl = document.getElementById('count');
    const refreshBtn = document.getElementById('refresh');
    const lastUpdated = document.getElementById('last-updated');
    
    async function loadContainers() {
      containers = await ipcRenderer.invoke('get-containers');
      render();
    }
    
    function render() {
      const filter = searchInput.value.toLowerCase();
      const filtered = containers.filter(c => 
        c.name.toLowerCase().includes(filter)
      );
      
      const running = filtered.filter(c => c.status === 'running').length;
      countEl.textContent = running;
      
      if (filtered.length === 0) {
        containerList.innerHTML = '<div class="empty-state">No containers found</div>';
        return;
      }
      
      containerList.innerHTML = filtered.map(c => `
        <div class="container-item" data-id="${c.id}">
          <div class="container-name">
            <span class="status-dot status-${c.status}"></span>
            ${c.name}
          </div>
          <div class="container-image">${c.image}</div>
        </div>
      `).join('');
      
      lastUpdated.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    }
    
    searchInput.addEventListener('input', render);
    
    refreshBtn.addEventListener('click', loadContainers);
    
    containerList.addEventListener('click', async (e) => {
      const item = e.target.closest('.container-item');
      if (item) {
        const id = item.dataset.id;
        await ipcRenderer.invoke('toggle-container', id);
        await loadContainers();
      }
    });
    
    window.electronAPI.onContainersUpdated((newContainers) => {
      containers = newContainers;
      render();
    });
    
    loadContainers();
    setInterval(loadContainers, 10000);
  </script>
</body>
</html>
